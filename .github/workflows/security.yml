name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  bandit:
    name: bandit scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security scanner
        run: |
          python -m pip install --upgrade pip
          python -m pip install "bandit[toml]>=1.7"

      - name: Run Bandit security scan
        run: |
          bandit -r researchclaw -f json -o bandit-report.json || true
          bandit -r researchclaw -ll || true

      - name: Upload bandit-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
